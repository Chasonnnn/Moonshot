services:
  postgres:
    image: postgres:18
    container_name: moonshot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moonshot
      POSTGRES_PASSWORD: moonshot
      POSTGRES_DB: moonshot
    ports:
      - "5432:5432"
    volumes:
      - moonshot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moonshot -d moonshot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  moonshot-postgres-data:
