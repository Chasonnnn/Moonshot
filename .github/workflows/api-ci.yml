name: api-ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run --extra dev pytest
      - name: Contract governance check
        run: uv run python apps/api/scripts/check_contract_governance.py
      - name: OpenAPI sync check
        run: uv run python apps/api/scripts/check_openapi_sync.py
      - name: Frontend contract sync check
        run: uv run python apps/api/scripts/check_frontend_contract_sync.py
      - name: API examples contract check
        run: uv run python apps/api/scripts/check_api_examples.py
      - name: Report summary consistency check
        run: uv run python apps/api/scripts/check_report_summary_consistency.py
      - name: Export schema lock check
        run: uv run python apps/api/scripts/check_export_schema.py
      - name: Score drift baseline check
        run: uv run python apps/api/scripts/check_score_drift.py
      - name: Memory benchmark check
        run: uv run python apps/api/scripts/check_memory_eval.py

  release-gate:
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: moonshot
          POSTGRES_PASSWORD: moonshot
          POSTGRES_DB: moonshot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moonshot -d moonshot_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MOONSHOT_DATABASE_URL: postgresql+psycopg://moonshot:moonshot@127.0.0.1:5432/moonshot_ci
      MOONSHOT_MODEL_PROVIDER: openai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Postgres migration gate
        run: |
          cd apps/api
          uv run python scripts/guard_postgres_migration_target.py
          uv run alembic upgrade head
      - name: Start API and worker
        run: |
          cd apps/api
          nohup uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 >/tmp/moonshot-api.log 2>&1 &
          nohup uv run python -m app.workers.main >/tmp/moonshot-worker.log 2>&1 &
      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          cat /tmp/moonshot-api.log || true
          exit 1
      - name: Staging smoke gate
        run: |
          set -o pipefail
          uv run python apps/api/scripts/staging_smoke.py --base-url http://127.0.0.1:8000 --tenant-id tenant_ci | tee /tmp/staging-smoke.log
      - name: Load gate
        run: |
          set -o pipefail
          uv run python apps/api/scripts/load_pilot.py --base-url http://127.0.0.1:8000 --tenant-id tenant_ci_load --samples 240 --concurrency 8 --max-p95-ms 500 | tee /tmp/load-pilot.log
      - name: Upload release-gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-logs
          path: |
            /tmp/staging-smoke.log
            /tmp/load-pilot.log
            /tmp/moonshot-api.log
            /tmp/moonshot-worker.log
