name: api-ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade uv
      - name: Sync dependencies
        run: |
          uv sync --extra dev
      - name: Run tests
        run: uv run --extra dev pytest
      - name: Contract governance check
        run: uv run python apps/api/scripts/check_contract_governance.py
      - name: OpenAPI sync check
        run: uv run python apps/api/scripts/check_openapi_sync.py
      - name: Score drift baseline check
        run: uv run python apps/api/scripts/check_score_drift.py
